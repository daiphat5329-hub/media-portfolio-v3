<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án | High-end Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <div class="noise-overlay"></div>
    <div class="ambient-glow glow-1"></div>

    <nav class="navbar" style="background: rgba(10, 10, 10, 0.95);">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">MEDIA<span>PRO</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="portfolio.html" class="active">Dự án</a></li>
            <li><a href="about.html">Giới thiệu</a></li>
            <li><a href="services.html">Dịch vụ</a></li>
            <li><a href="contact.html">Liên hệ</a></li>
        </ul>
    </nav>

    <div class="subpage-hero gs-reveal">
        <div class="container">
            <h1 class="giant-text text-stroke">TÁC PHẨM</h1>
        </div>
    </div>

    <section id="portfolio" class="portfolio">
        <div class="container">
            <div class="portfolio-filters gs-reveal">
                <button class="filter-btn active" data-filter="all">Tất cả</button>
                <button class="filter-btn" data-filter="wedding">Wedding</button>
                <button class="filter-btn" data-filter="event">Event</button>
                <button class="filter-btn" data-filter="ads">3D Ads & TVC</button>
                <button class="filter-btn" data-filter="vfx">VFX</button>
            </div>
            <div class="portfolio-grid" id="portfolio-grid">
                <!-- Javascript will load all projects here -->
            </div>
        </div>
    </section>

    <footer>
        <div style="width: 100%; position: relative;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <p>&copy; <span id="year">2026</span></p>
                <p>All rights reserved.</p>
            </div>
            <h1 class="footer-giant" id="footer-name">MediaPro</h1>
        </div>
    </footer>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-container">
                <iframe id="youtubePlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
